services:
  db:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: llm_intel_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: llm_intel
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: llm_intel_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: llm_intel_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: llm_intel_api
    depends_on:
      - db
      - redis
      - minio
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=llm_intel
      - REDIS_HOST=redis
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../../backend:/app

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: llm_intel_worker
    depends_on:
      - db
      - redis
      - minio
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=llm_intel
      - REDIS_HOST=redis
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - ../../backend:/app

volumes:
  db_data:
  redis_data:
  minio_data:
