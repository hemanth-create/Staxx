# =============================================================================
# Staxx Intelligence — LLM Provider Pricing Catalog
# =============================================================================
# All prices are in USD per 1,000,000 (1M) tokens.
# Update this file when providers change pricing.
# The cost engine reloads this file every hour (configurable via
# PRICING_REFRESH_INTERVAL_SECONDS env var).
# =============================================================================

# Fallback pricing used when a model is not found in the catalog.
# Set conservatively high so unknown models don't silently under-report costs.
fallback_pricing:
  input_per_1m_tokens: 3.00
  output_per_1m_tokens: 15.00

# Default token estimation ratio: approximate tokens = characters / this value.
# Used when token counts are missing from telemetry events.
token_estimation_chars_per_token: 4

