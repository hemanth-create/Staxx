version: '3.9'

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 16 + TimescaleDB
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: staxx-postgres
    environment:
      POSTGRES_USER: staxx
      POSTGRES_PASSWORD: staxx_dev_password
      POSTGRES_DB: staxx
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staxx"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staxx-network

  # ─────────────────────────────────────────────────────────────
  # Redis 7 (Celery broker + caching)
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: staxx-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staxx-network

  # ─────────────────────────────────────────────────────────────
  # MinIO (S3-compatible storage)
  # ─────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: staxx-minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staxx-network

  # ─────────────────────────────────────────────────────────────
  # MinIO Bucket Initialization
  # ─────────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: staxx-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc config host add myminio http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing myminio/staxx-outputs;
      exit 0;
      "
    networks:
      - staxx-network

  # ─────────────────────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: staxx-backend
    ports:
      - "8000:8000"
    environment:
      # Database
      POSTGRES_SERVER: postgres
      POSTGRES_USER: staxx
      POSTGRES_PASSWORD: staxx_dev_password
      POSTGRES_DB: staxx
      POSTGRES_PORT: 5432

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # MinIO / S3
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_BUCKET_NAME: staxx-outputs

      # Auth / Billing
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_GROWTH: ${STRIPE_PRICE_GROWTH:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - staxx-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Proxy Gateway (FastAPI)
  # ─────────────────────────────────────────────────────────────
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: staxx-proxy
    ports:
      - "8080:8080"
    environment:
      STAXX_PROXY_HOST: 0.0.0.0
      STAXX_PROXY_PORT: 8080
      STAXX_PROXY_REDIS_URL: redis://redis:6379/0
      STAXX_PROXY_DATABASE_URL: postgresql://staxx:staxx_dev_password@postgres:5432/staxx
      STAXX_PROXY_DEBUG: ${STAXX_PROXY_DEBUG:-false}
      STAXX_PROXY_OPENAI_BASE_URL: https://api.openai.com
      STAXX_PROXY_ANTHROPIC_BASE_URL: https://api.anthropic.com
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./proxy:/app
    networks:
      - staxx-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Celery Worker (async task processing)
  # ─────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: staxx-celery-worker
    command: celery -A app.workers.celery_app worker -c 4 -Q metrics,default --loglevel=info
    environment:
      POSTGRES_SERVER: postgres
      POSTGRES_USER: staxx
      POSTGRES_PASSWORD: staxx_dev_password
      POSTGRES_DB: staxx
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      S3_BUCKET_NAME: staxx-outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - staxx-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Celery Beat (periodic task scheduler)
  # ─────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: staxx-celery-beat
    command: celery -A app.workers.celery_app beat -s /tmp/celerybeat-schedule --loglevel=info
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - staxx-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # Frontend (Vite React dev server)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: staxx-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
    networks:
      - staxx-network
    restart: unless-stopped

networks:
  staxx-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
